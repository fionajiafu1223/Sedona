<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { min-height:100vh; background:transparent; font-family:'Noto Serif SC',serif; padding:80px 16px 32px; }
.page-title { text-align:center; font-size:1.1rem; letter-spacing:0.2em; color:rgba(3,80,140,0.85); margin-bottom:24px; }
.page-wrap { max-width:480px; margin:0 auto; background:rgba(255,255,255,0.78); border-radius:20px; padding:20px 16px; box-shadow:0 8px 32px rgba(0,60,120,0.10); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.85); }

  .asst-panel { display: flex; flex-direction: column; gap: 12px; }
  .asst-subtitle {
    font-size: 0.78rem; color: #5a7aa0;
    font-family: 'Noto Sans SC', sans-serif;
    letter-spacing: 0.04em; line-height: 1.6;
  }
  .asst-textarea {
    width: 100%; min-height: 100px; padding: 12px 14px;
    border: 1.5px solid rgba(140,180,225,0.5); border-radius: 14px;
    background: rgba(255,255,255,0.7); color: #0e2840;
    font-family: 'Noto Serif SC', serif; font-size: 0.92rem;
    line-height: 1.7; outline: none; resize: vertical;
  }
  .asst-textarea:focus { border-color: rgba(80,140,220,0.75); }
  .asst-submit {
    padding: 12px; border: none; border-radius: 14px;
    background: linear-gradient(160deg, rgba(80,140,220,0.85) 0%, rgba(60,180,150,0.75) 100%);
    color: #fff; font-family: 'Noto Serif SC', serif; font-size: 0.92rem;
    cursor: pointer; transition: transform 0.18s;
  }
  .asst-submit:hover { opacity: 0.88; transform: scale(1.04); }
  .asst-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .asst-result {
    display: none; flex-direction: column; gap: 14px; margin-top: 8px;
  }
  .asst-result.show { display: flex; }

  .asst-desire-badges { display: flex; gap: 8px; flex-wrap: wrap; }
  .asst-badge {
    padding: 6px 14px; border-radius: 99px;
    font-size: 0.85rem; font-family: 'Noto Serif SC', serif;
  }
  .asst-badge.bc { background: rgba(255,192,210,0.55); color: #7a1030; border: 1.5px solid rgba(192,51,82,0.3); }
  .asst-badge.ba { background: rgba(153,251,200,0.45); color: #0a4a28; border: 1.5px solid rgba(24,134,73,0.3); }
  .asst-badge.bs { background: rgba(161,202,255,0.45); color: #0a2860; border: 1.5px solid rgba(43,74,219,0.3); }

  .asst-analysis {
    display: flex; flex-direction: column; gap: 10px;
  }
  .asst-point {
    background: rgba(255,255,255,0.75); border-radius: 14px;
    padding: 12px 14px;
    border: 1px solid rgba(180,210,240,0.4);
    display: flex; flex-direction: column; gap: 6px;
  }
  .asst-point-badge {
    align-self: flex-start; padding: 3px 10px; border-radius: 99px;
    font-size: 0.75rem; font-family: 'Noto Serif SC', serif;
  }
  .asst-point-body {
    display: flex; flex-direction: column; gap: 6px;
  }
  .asst-point-quote {
    font-size: 0.92rem; color: #0e2840; font-style: italic;
    padding: 6px 0;
  }
  .asst-point-reason {
    font-size: 0.82rem; color: #5a7aa0; line-height: 1.7;
    font-family: 'Noto Sans SC', sans-serif;
  }
  .asst-loading {
    display: none; align-items: center; justify-content: center; gap: 8px;
    padding: 24px; color: #5a7aa0;
  }
  .asst-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(80,140,220,0.7);
    animation: dotPulse 1.4s ease infinite;
  }
  .asst-dot:nth-child(2) { animation-delay: 0.2s; }
  .asst-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse {
    0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
    30% { opacity: 1; transform: scale(1.2); }
  }
  
  .asst-go-btn {
    width: 100%; padding: 12px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, #4a9fd4, #2a7abf); color: #fff;
    font-family: 'Noto Serif SC', serif; font-size: 0.92rem; letter-spacing: 0.08em;
    cursor: pointer; transition: opacity 0.2s, transform 0.15s;
    margin-top: 4px;
  }
  .asst-go-btn:hover { opacity: 0.88; transform: scale(1.02); }
  
  .asst-error {
    padding: 14px; color: #c04040; font-size: 0.82rem;
    line-height: 1.7; font-family: 'Noto Sans SC', sans-serif;
    background: rgba(255,230,230,0.6); border-radius: 12px;
    border: 1px solid rgba(220,80,80,0.3);
  }
</style>

<body>
<script>
(function() {
var canvas = document.createElement('canvas');
canvas.id = 'bgCanvas';
canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;';
document.body.insertBefore(canvas, document.body.firstChild);
var ctx = canvas.getContext('2d');
var W, H, t = 0;

const EMOTION_COLORS = [
  {r:144, g:96,  b:208}, // 恐惧 紫
  {r:48,  g:80,  b:176}, // 悲苦 深蓝
  {r:80,  g:110, b:160}, // 万念俱灰 蓝灰
  {r:192, g:96,  b:16 }, // 贪求 橙
  {r:192, g:32,  b:32 }, // 愤怒 红
  {r:176, g:128, b:0  }, // 自尊自傲 金
  {r:16,  g:160, b:144}, // 无畏 青绿
  {r:16,  g:160, b:80 }, // 接纳 绿
  {r:74,  g:176, b:224}, // 平和 天蓝
];


class Bubble {
  constructor(fromBottom) {
    this.reset(fromBottom);
  }

  reset(startAtBottom) {
    this.x    = Math.random() * W;
    this.y    = startAtBottom ? H + 20 + Math.random()*100 : Math.random() * H;
    this.r    = 2 + Math.random() * 22;
    this.vy   = -(0.4 + Math.random() * 1.2);
    this.vx   = 0;
    this.wobbleAmp   = 0.4 + Math.random() * 1.2;
    this.wobbleFreq  = 0.8 + Math.random() * 1.5;
    this.wobblePhase = Math.random() * Math.PI * 2;
    this.opacity = 0.20 + Math.random() * 0.20;
    this.life    = 0;
    this.maxLife = (H + 200) / Math.abs(this.vy) * (0.7 + Math.random()*0.5);
    this.vy *= (0.8 + this.r / 30);
    this.color = EMOTION_COLORS[Math.floor(Math.random() * EMOTION_COLORS.length)];
  }

  update(t) {
    this.life++;
    // wobbly horizontal drift — classic bubble sway
    this.x += Math.sin(t * this.wobbleFreq + this.wobblePhase) * this.wobbleAmp;
    this.y += this.vy;

    // fade in at bottom, fade out at top
    const progress = this.life / this.maxLife;
    if (progress < 0.08) {
      this.opacity = (progress / 0.08) * (0.25 + Math.random()*0.01);
    } else if (progress > 0.85) {
      this.opacity *= 0.97;
    }

    if (this.y < -this.r * 3 || this.life > this.maxLife) {
      this.reset(true);
    }
  }

  draw() {
    const x = this.x, y = this.y, r = this.r;
    const a = this.opacity;

    const {r:cr, g:cg, b:cb} = this.color;

    // outer soft glow — emotion color
    const glow = ctx.createRadialGradient(x,y,r*0.4,x,y,r*2.2);
    glow.addColorStop(0, `rgba(${cr},${cg},${cb},${a*0.65})`);
    glow.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
    ctx.beginPath(); ctx.arc(x,y,r*2.2,0,Math.PI*2);
    ctx.fillStyle=glow; ctx.fill();

    // glass shell — tinted with emotion color
    const shell = ctx.createRadialGradient(x-r*0.32,y-r*0.32,r*0.01, x,y,r);
    shell.addColorStop(0.00, `rgba(255,255,255,${a*0.70})`);
    shell.addColorStop(0.12, `rgba(255,255,255,${a*0.15})`);
    shell.addColorStop(0.55, `rgba(${cr},${cg},${cb},${a*0.48})`);
    shell.addColorStop(0.82, `rgba(${cr},${cg},${cb},${a*0.62})`);
    shell.addColorStop(1.00, `rgba(${cr},${cg},${cb},${a*0.75})`);
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=shell; ctx.fill();

    // rim ring — emotion color tint
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.strokeStyle = `rgba(${cr},${cg},${cb},${a*0.90})`;
    ctx.lineWidth = Math.max(0.5, r*0.06);
    ctx.stroke();

    // primary specular — brighter for dark areas
    const sp = ctx.createRadialGradient(x-r*0.35,y-r*0.35,0,x-r*0.30,y-r*0.30,r*0.32);
    sp.addColorStop(0, `rgba(255,255,255,${Math.min(1, a*1.6)})`);
    sp.addColorStop(1, `rgba(255,255,255,0)`);
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=sp; ctx.fill();

    // tiny secondary shimmer
    const sp2 = ctx.createRadialGradient(x+r*0.38,y+r*0.30,0,x+r*0.38,y+r*0.30,r*0.14);
    sp2.addColorStop(0, `rgba(255,255,255,${a*0.38})`);
    sp2.addColorStop(1, `rgba(255,255,255,0)`);
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=sp2; ctx.fill();
  }
}

const BUBBLES = Array.from({length: 55}, (_, i) => new Bubble(i > 20));

// hero bubble — large, center, also rising slowly

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
function draw() {
  requestAnimationFrame(draw);
  t += 0.01;
  ctx.clearRect(0, 0, W, H);
  var bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#cdeeff');
  bg.addColorStop(0.4, '#a8d8f0');
  bg.addColorStop(0.7, '#7abde0');
  bg.addColorStop(1, '#4a8fbf');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
  BUBBLES.forEach(function(b) { b.update(t); b.draw(); });
}
window.addEventListener('resize', resize);
resize();
draw();
})();
</script>
<div class="page-title">🫧 释 放 助 手 <span style="font-size:0.6rem;opacity:0.5;">v3</span></div>
<div class="page-wrap">
  <div class="asst-panel">
    <p class="asst-subtitle">写下你对一件事的感受、担忧或执着，释放助手会帮你看见背后的欲望模式。</p>
    <textarea class="asst-textarea" id="asstInput" placeholder="例：我每天都在想她什么时候才能回我消息，吃不下饭睡不着觉……"></textarea>
    <button class="asst-submit" id="asstSubmit" onclick="runAssistant()">✨ 分析</button>
    <div class="asst-loading" id="asstLoading">
      <span class="asst-dot"></span><span class="asst-dot"></span><span class="asst-dot"></span>
      <span style="font-size:0.85rem;">正在洞察…</span>
    </div>
    <div class="asst-result" id="asstResult"></div>
  </div>
</div>

<script>
const currentLang = 'zh';

const DESIRE_INFO = { control:{label:'想要控制',cls:'bc'}, approval:{label:'想要被认同',cls:'ba'}, safety:{label:'想要安全',cls:'bs'} };

let asstPoints = [];

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  var el = document.getElementById('asstToast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'asstToast';
    el.style.cssText = 'position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(10,40,80,0.85);color:#fff;padding:10px 20px;border-radius:99px;font-size:0.85rem;z-index:9999;transition:opacity 0.4s;pointer-events:none;';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.style.opacity = '0'; }, 2500);
}

function t(key) {
  var map = {
    'toast_no_input': '请先写下你的感受',
    'toast_no_result': '没有可释放的结果',
    'asst_go': '🫧 去释放这些想要',
  };
  return map[key] || key;
}

function startReleaseQueue() {
  if (!asstPoints.length) { showToast(t('toast_no_result')); return; }
  // Save to sessionStorage and go to desire page
  sessionStorage.setItem('asstReleaseQueue', JSON.stringify(asstPoints));
  window.location.href = 'desire.html';
}

function getLangSystemPrompt() {
  if (currentLang === 'en') {
    return 'You are a deep psychological insight guide, expert in the Sedona Method.\n\n'
      + 'The three core desires:\n'
      + '- control: craving to control situations, outcomes, others; fear of losing control\n'
      + '- approval: craving acceptance, validation, love; fear of rejection, criticism, abandonment\n'
      + '- safety: craving stability, certainty, permanence; fear of loss, change, harm\n\n'
      + 'Tasks:\n'
      + '1. Read deeply — sense emotional structure beneath surface words\n'
      + '2. Map each distinct thought/feeling to its underlying desire\n'
      + '3. Prioritise desires the user hasn\'t consciously noticed\n'
      + '4. Note how desires intertwine\n\n'
      + 'Principles:\n'
      + '- Explain WHY each thought reveals this desire\n'
      + '- Write like a warm but perceptive counselor\n'
      + '- If user expressed A but B hides beneath, name B\n'
      + '- 40-60 words per reason\n\n'
      + 'Reply ONLY in this JSON format:\n'
      + '{"points":[{"quote":"brief phrase max 20 words","desire":"control|approval|safety","reason":"insight 40-60 words"}]}\n\n'
      + 'No limit on number of points. List every insight. Same desire can appear multiple times.';
  }
  return '你是一位深度心理洞察师，精通圣多纳释放法（Sedona Method）。\n\n'
    + '三种核心欲望：\n'
    + '- control（想要控制）：渴望掌控局面、结果、他人；害怕失控、混乱、不确定\n'
    + '- approval（想要被认同）：渴望被接受、肯定、爱；害怕被拒绝、批评、抛弃\n'
    + '- safety（想要安全）：渴望稳定、保障、确定；害怕失去、改变、受伤\n\n'
    + '任务：\n'
    + '1. 感受文字背后的情绪结构，不只看表面词汇\n'
    + '2. 找出每个独立想法或情绪点，识别背后的欲望类型\n'
    + '3. 重点洞察用户没有意识到的深层欲望\n'
    + '4. 注意欲望之间的交织\n\n'
    + '原则：\n'
    + '- 解释为什么这个想法背后是这种欲望\n'
    + '- 像温柔而犀利的咨询师说话，让人感到被看见又能揭示盲点\n'
    + '- 如果用户表达了A但背后藏着B，要指出来\n'
    + '- 每条reason控制在40-60字\n\n'
    + '严格用以下JSON格式回复，不要任何其他内容：\n'
    + '{"points":[{"quote":"从用户原文提炼的短句不超过20字","desire":"control或approval或safety","reason":"深度洞察40-60字"}]}\n\n'
    + '重要：不要限制条数。每个值得洞察的点都单独列出，同一种欲望可以多次出现。';
}

async function runAssistant() {
  const text = document.getElementById('asstInput').value.trim();
  if (!text) { showToast(t('toast_no_input')); return; }

  const loadingEl = document.getElementById('asstLoading');
  const resultEl  = document.getElementById('asstResult');

  loadingEl.style.display = 'flex';
  resultEl.classList.remove('show');

  try {
    const SYSTEM_PROMPT = getLangSystemPrompt();

    // Retry up to 3 times for network reliability
    let res = null;
    let lastErr = null;
    for (let attempt = 0; attempt < 3; attempt++) {
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 30000);
        res = await fetch('https://api.freedreleasing.com/api', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          signal: controller.signal,
          body: JSON.stringify({
            model: 'deepseek-chat',
            max_tokens: 1200,
            messages: [
              { role: 'system', content: SYSTEM_PROMPT },
              { role: 'user',   content: text },
            ],
          }),
        });
        clearTimeout(timeoutId);
        if (res.ok) break;
        lastErr = new Error('HTTP ' + res.status);
      } catch(err) {
        lastErr = err;
      }
      // Wait before retry (1s, 2s)
      if (attempt < 2) await new Promise(r => setTimeout(r, (attempt + 1) * 1000));
    }
    if (!res || !res.ok) throw lastErr || new Error('网络请求失败，请稍后再试');

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const raw = data.choices?.[0]?.message?.content || '';
    if (!raw) throw new Error('empty response');

    let json = { points: [] };
    try {
      const start = raw.indexOf('{');
      const end = raw.lastIndexOf('}');
      json = JSON.parse(raw.slice(start, end + 1));
    } catch(_) {}

    // Try multiple possible field names from AI response
    let rawPoints = json.points || json.results || json.analysis || json.data || [];
    if (!Array.isArray(rawPoints)) rawPoints = [];
    
    // Map common variations to expected schema
    asstPoints = rawPoints.map(p => {
      // Normalize desire field
      let desire = p.desire || p.type || p.category || '';
      desire = String(desire).toLowerCase();
      if (desire.includes('control') || desire.includes('控制')) desire = 'control';
      else if (desire.includes('approval') || desire.includes('认同') || desire.includes('被爱')) desire = 'approval';
      else if (desire.includes('safety') || desire.includes('安全') || desire.includes('survival')) desire = 'safety';
      return {
        desire: desire,
        quote: p.quote || p.text || p.phrase || '',
        reason: p.reason || p.explanation || p.analysis || ''
      };
    }).filter(p => DESIRE_INFO[p.desire]);
    
    if (!asstPoints.length) {
      // Show raw response so user can see what AI returned
      console.log('Raw AI response:', raw);
      throw new Error('AI 返回格式异常，请重试。返回内容：' + raw.slice(0, 100));
    }

    // 重置结果区结构（防止被错误信息替换掉）
    resultEl.innerHTML = '<div class="asst-desire-badges" id="asstBadges"></div>'
      + '<div class="asst-analysis" id="asstAnalysis"></div>'
      + '<button class="asst-go-btn" id="asstGoBtn" onclick="startReleaseQueue()">' + t('asst_go') + '</button>';

    const seenBadge = new Set();
    document.getElementById('asstBadges').innerHTML = asstPoints
      .filter(p => !seenBadge.has(p.desire) && seenBadge.add(p.desire))
      .map(p => `<span class="asst-badge ${DESIRE_INFO[p.desire].cls}">${DESIRE_INFO[p.desire].label}</span>`)
      .join('');

    document.getElementById('asstAnalysis').innerHTML = asstPoints.map(p => `
      <div class="asst-point">
        <span class="asst-point-badge ${DESIRE_INFO[p.desire].cls}">${DESIRE_INFO[p.desire].label}</span>
        <div class="asst-point-body">
          <span class="asst-point-quote">「${escapeHtml(p.quote)}」</span>
          <span class="asst-point-reason">${escapeHtml(p.reason)}</span>
        </div>
      </div>
    `).join('');

    resultEl.classList.add('show');
  } catch(e) {
    const msg = (e && e.message) ? e.message : String(e);
    showToast('❌ ' + msg.slice(0, 80));
    // 同时在结果区显示完整错误
    resultEl.innerHTML = '<div style="padding:12px;color:#c04040;font-size:0.78rem;line-height:1.6;font-family:monospace;word-break:break-all;">错误：' + msg + '</div>';
    resultEl.classList.add('show');
    console.error('Assistant error:', e);
  } finally {
    loadingEl.style.display = 'none';
  }
}
</script>
