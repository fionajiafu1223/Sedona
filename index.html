#hero-bubble {
  position:fixed;
  z-index:9;
  left:50%;
  top:48%;
  transform:translate(-50%,-50%);
  width:min(41vw, 41vh);
  height:min(41vw, 41vh);
  border-radius:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  cursor:pointer;
  /* glass look */
  background: radial-gradient(circle at 28% 12%,
    rgba(255,255,255,0.82) 0%,
    rgba(255,255,255,0.30) 8%,
    rgba(255,255,255,0.04) 22%,
    rgba(140,210,255,0.08) 55%,
    rgba(100,180,240,0.12) 85%,
    rgba(100,180,240,0) 100%
  );
  border: 1px solid rgba(255,255,255,0.75);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.45),
    0 6px 40px rgba(80,160,220,0.20);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  animation: heroBob 3.8s ease-in-out infinite;
}
@keyframes heroBob {
  0%,100% { margin-top:0px; }
  50%      { margin-top:-10px; }
}
#hero-bubble .line1 {
  font-family:'ITC Bauhaus','Josefin Sans',sans-serif;
  font-weight:500; font-size:0.55rem;
  letter-spacing:0.10em; font-style:normal;
  color:rgba(255,255,255,0.92);
  line-height:1.5;
  white-space:nowrap;
}
#hero-bubble .line2 {
  font-family:'ITC Bauhaus','Josefin Sans',sans-serif;
  font-weight:500; font-size:0.55rem;
  letter-spacing:0.20em; font-style:normal;
  color:rgba(255,255,255,0.92);
  line-height:1.5;
}
#hero-bubble h1 {
  font-family:'ITC Bauhaus','Josefin Sans',sans-serif;
  font-weight:900; font-size:1.8rem;
  letter-spacing:0.12em;
  color:rgba(235,250,255,0.97);
  margin-top:3px; line-height:1;
}
#hero-bubble .text-wrap {
  margin-top:-8%;
}


/* ── NAV BUBBLES ── */
.nav-bubble {
  position:fixed;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  text-align:center;
  cursor:pointer;
  pointer-events:auto;
  font-family:'ITC Bauhaus','Josefin Sans',sans-serif;
  font-weight:500;
  color:rgba(220,245,255,0.92);
  text-shadow:0 1px 6px rgba(0,60,120,0.4);
  line-height:1.3;
  letter-spacing:0.06em;
  transform:translate(-50%,-50%) scale(0);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
  opacity:0;
  z-index:15;
  user-select:none;
  backdrop-filter:blur(3px);
}
.nav-bubble.visible {
  transform:translate(-50%,-50%) scale(1);
  opacity:1;
  animation: navBob var(--bob-dur, 3.5s) ease-in-out infinite;
  animation-delay: var(--bob-delay, 0s);
  animation-fill-mode: both;
}
.nav-bubble:active { transform:translate(-50%,-50%) scale(0.92); }

@keyframes navBob {
  0%,100% { margin-top: 0px; }
  50%      { margin-top: -8px; }
}

  z-index: 100;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: none;

  font-family: 'Noto Serif SC', serif;
  font-size: 0.95rem;
  font-weight: 500;
  color: rgba(235, 250, 255, 0.98);
  text-shadow: 0 1px 3px rgba(0, 60, 120, 0.6);
  letter-spacing: 0;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  background: radial-gradient(circle at 32% 28%,
    rgba(255,255,255,0.55) 0%,
    rgba(220,235,250,0.30) 25%,

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ── BACKGROUND ──
function drawBg() {
  // deep ocean gradient — dark at bottom, light rays from top
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0.00, '#c2ecf8');  // surface light
  bg.addColorStop(0.25, '#8ed4ee');
  bg.addColorStop(0.55, '#4aaed8');
  bg.addColorStop(0.80, '#1a7ab5');
  bg.addColorStop(1.00, '#0d4870');  // deep dark
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);
}

// ── LIGHT RAYS from surface ──
function drawRays(t) {
  ctx.save();
  const rayColors = [
    'rgba(180,240,255,0.04)',
    'rgba(160,230,255,0.03)',
    'rgba(200,245,255,0.035)',
  ];
  const rays = [
    {x:0.25, width:0.12, drift:0.015},
    {x:0.45, width:0.08, drift:-0.010},
    {x:0.62, width:0.14, drift:0.012},
    {x:0.80, width:0.07, drift:-0.008},
    {x:0.15, width:0.06, drift:0.018},
  ];
  rays.forEach((r, i) => {
    const cx = (r.x + Math.sin(t*0.3 + i) * r.drift) * W;
    const hw = r.width * W * 0.5;
    const grad = ctx.createLinearGradient(0, 0, 0, H*0.75);
    grad.addColorStop(0,   rayColors[i % rayColors.length].replace('0.04', String(0.055 + Math.sin(t*0.4+i)*0.015)));
    grad.addColorStop(0.6, rayColors[i % rayColors.length]);
    grad.addColorStop(1,   'rgba(180,240,255,0)');
    ctx.beginPath();
    ctx.moveTo(cx - hw*0.2, 0);
    ctx.lineTo(cx + hw*0.2, 0);
    ctx.lineTo(cx + hw, H*0.75);
    ctx.lineTo(cx - hw, H*0.75);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
  });
  ctx.restore();
}

// ── CAUSTICS (wavy light patterns on sea floor) ──
function drawCaustics(t) {
  ctx.save();
  ctx.globalAlpha = 0.06;
  for (let i = 0; i < 8; i++) {
    const x = (0.1 + i*0.12 + Math.sin(t*0.5+i)*0.04) * W;
    const y = H*0.88 + Math.sin(t*0.6+i*1.3)*12;
    const r = (20 + Math.sin(t*0.4+i)*8);
    const g = ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,'rgba(180,240,255,0.8)');
    g.addColorStop(1,'rgba(180,240,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// ── BUBBLE CLASS ──
// 9 emotion colors
const EMOTION_COLORS = [
  {r:144, g:96,  b:208}, // 恐惧 紫
  {r:48,  g:80,  b:176}, // 悲苦 深蓝
  {r:80,  g:110, b:160}, // 万念俱灰 蓝灰
  {r:192, g:96,  b:16 }, // 贪求 橙
  {r:192, g:32,  b:32 }, // 愤怒 红
  {r:176, g:128, b:0  }, // 自尊自傲 金
  {r:16,  g:160, b:144}, // 无畏 青绿
  {r:16,  g:160, b:80 }, // 接纳 绿
  {r:74,  g:176, b:224}, // 平和 天蓝
];

class Bubble {
  constructor(fromBottom) {
    this.reset(fromBottom);
  }

  reset(startAtBottom) {
    this.x    = Math.random() * W;
    this.y    = startAtBottom ? H + 20 + Math.random()*100 : Math.random() * H;
    this.r    = 2 + Math.random() * 22;
    this.vy   = -(0.4 + Math.random() * 1.2);
    this.vx   = 0;
    this.wobbleAmp   = 0.4 + Math.random() * 1.2;
    this.wobbleFreq  = 0.8 + Math.random() * 1.5;
    this.wobblePhase = Math.random() * Math.PI * 2;
    this.opacity = 0.20 + Math.random() * 0.20;
    this.life    = 0;
    this.maxLife = (H + 200) / Math.abs(this.vy) * (0.7 + Math.random()*0.5);
    this.vy *= (0.8 + this.r / 30);
    this.color = EMOTION_COLORS[Math.floor(Math.random() * EMOTION_COLORS.length)];
  }

  update(t) {
    this.life++;
    // wobbly horizontal drift — classic bubble sway
    this.x += Math.sin(t * this.wobbleFreq + this.wobblePhase) * this.wobbleAmp;
    this.y += this.vy;

    // fade in at bottom, fade out at top
    const progress = this.life / this.maxLife;
    if (progress < 0.08) {
      this.opacity = (progress / 0.08) * (0.25 + Math.random()*0.01);
    } else if (progress > 0.85) {
      this.opacity *= 0.97;
    }

    if (this.y < -this.r * 3 || this.life > this.maxLife) {
      this.reset(true);
    }
  }

  draw() {
    const x = this.x, y = this.y, r = this.r;
    const a = this.opacity;

    const {r:cr, g:cg, b:cb} = this.color;

    // outer soft glow — emotion color
    const glow = ctx.createRadialGradient(x,y,r*0.4,x,y,r*2.2);
    glow.addColorStop(0, `rgba(${cr},${cg},${cb},${a*0.65})`);
    glow.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
    ctx.beginPath(); ctx.arc(x,y,r*2.2,0,Math.PI*2);
    ctx.fillStyle=glow; ctx.fill();

    // glass shell — tinted with emotion color
    const shell = ctx.createRadialGradient(x-r*0.32,y-r*0.32,r*0.01, x,y,r);
    shell.addColorStop(0.00, `rgba(255,255,255,${a*0.70})`);
    shell.addColorStop(0.12, `rgba(255,255,255,${a*0.15})`);
    shell.addColorStop(0.55, `rgba(${cr},${cg},${cb},${a*0.48})`);
    shell.addColorStop(0.82, `rgba(${cr},${cg},${cb},${a*0.62})`);
    shell.addColorStop(1.00, `rgba(${cr},${cg},${cb},${a*0.75})`);
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=shell; ctx.fill();

    // rim ring — emotion color tint
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.strokeStyle = `rgba(${cr},${cg},${cb},${a*0.90})`;
    ctx.lineWidth = Math.max(0.5, r*0.06);
    ctx.stroke();

    // primary specular — brighter for dark areas
    const sp = ctx.createRadialGradient(x-r*0.35,y-r*0.35,0,x-r*0.30,y-r*0.30,r*0.32);
    sp.addColorStop(0, `rgba(255,255,255,${Math.min(1, a*1.6)})`);
    sp.addColorStop(1, `rgba(255,255,255,0)`);
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=sp; ctx.fill();

    // tiny secondary shimmer
    const sp2 = ctx.createRadialGradient(x+r*0.38,y+r*0.30,0,x+r*0.38,y+r*0.30,r*0.14);
    sp2.addColorStop(0, `rgba(255,255,255,${a*0.38})`);
    sp2.addColorStop(1, `rgba(255,255,255,0)`);
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=sp2; ctx.fill();
  }
}

// create bubbles — some start mid-screen so it's not empty at load
const BUBBLES = Array.from({length: 55}, (_, i) => new Bubble(i > 20));

// hero bubble — large, center, also rising slowly
const HERO = {
  x: 0, y: 0, r: 0,
  phase: 0,
};

function drawHeroBubble(x, y, r, t) {
  // large hero glow
  const glow = ctx.createRadialGradient(x,y,r*0.3,x,y,r*2.0);
  glow.addColorStop(0, 'rgba(140,220,255,0.18)');
  glow.addColorStop(1, 'rgba(80,180,255,0)');
  ctx.beginPath(); ctx.arc(x,y,r*2.0,0,Math.PI*2);
  ctx.fillStyle=glow; ctx.fill();

  // shell
  const shell = ctx.createRadialGradient(x-r*0.30,y-r*0.30,r*0.01,x,y,r);
  shell.addColorStop(0.00, 'rgba(255,255,255,0.08)');
  shell.addColorStop(0.12, 'rgba(255,255,255,0.04)');
  shell.addColorStop(0.45, 'rgba(160,230,255,0.10)');
  shell.addColorStop(0.80, 'rgba(100,200,240,0.15)');
  shell.addColorStop(1.00, 'rgba(140,215,255,0.28)');
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=shell; ctx.fill();

  // rim
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(200,245,255,0.55)';
  ctx.lineWidth=1.5; ctx.stroke();

  // specular — soft ellipse upper-left, light coming from top-left
  ctx.save();
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.clip();
  ctx.translate(x - r*0.28, y - r*0.58);
  ctx.rotate(-0.5);
  ctx.scale(1, 0.60);
  const spg = ctx.createRadialGradient(0,0,0,0,0,r*0.38);
  spg.addColorStop(0,   'rgba(255,255,255,0.62)');
  spg.addColorStop(0.5, 'rgba(255,255,255,0.18)');
  spg.addColorStop(1,   'rgba(255,255,255,0)');
  ctx.fillStyle=spg;
  ctx.beginPath(); ctx.arc(0,0,r*0.38,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

const heroEl = document.getElementById('hero-bubble');
let t = 0;
let bubbleAlpha = 1.0;
let bubbleTargetAlpha = 1.0;
let showHero = true;
let navState = 'hero';



function draw() {
  requestAnimationFrame(draw);
  t += 0.012;

  drawBg();
  drawRays(t);
  drawCaustics(t);

  // update & draw bubbles (small ones behind hero)
  // fade background bubbles
  bubbleAlpha += (bubbleTargetAlpha - bubbleAlpha) * 0.05;
  if (bubbleAlpha > 0.01) {
    ctx.globalAlpha = bubbleAlpha;
    BUBBLES.forEach(b => { b.update(t); b.draw(); });
    ctx.globalAlpha = 1.0;
  } else {
    BUBBLES.forEach(b => b.update(t)); // still update positions
  }

  // hero bubble — gentle bob
  const heroR = Math.min(W,H) * 0.18;
  const heroX = W*0.50 + Math.sin(t*0.28)*6;
  const heroY = H*0.42 + Math.sin(t*0.38)*10;
  if (showHero) {
    const d = heroR * 2;
    heroEl.style.width  = d + 'px';
    heroEl.style.height = d + 'px';
    heroEl.style.display = 'flex';
  } else {
    heroEl.style.display = 'none';
  }
}

document.fonts.ready.then(() => { draw(); });

// ── NAV STATE ──
// glow colors per bubble
const BUBBLE_GLOWS = [
  'rgba(80,160,255,0.35)',   // sky blue
  'rgba(160,80,255,0.35)',   // violet
  'rgba(40,190,140,0.35)',   // emerald
  'rgba(255,80,140,0.35)',   // rose
  'rgba(255,130,40,0.35)',   // amber
  'rgba(20,195,190,0.35)',   // teal
  'rgba(210,160,20,0.35)',   // gold
  'rgba(255,80,80,0.35)',    // coral
  'rgba(80,200,255,0.35)',   // cyan
  'rgba(200,100,255,0.35)',  // purple
  'rgba(100,220,120,0.35)',  // mint
  'rgba(255,180,40,0.35)',   // orange
];

// Fixed colors for main 4 nav bubbles
const NAV_MAIN_COLORS = {
  'tool-doublesides': 'rgba(240,220,180,0.55)',  // 好处坏处 奶油色
  'tool-sedona':      'rgba(20,195,190,0.55)',
  'tool-body':        'rgba(40,190,140,0.55)',
  'tool-whole':       'rgba(255,165,100,0.42)',   // 识别即释放 中橘
  'tool-relationship':'rgba(255,130,155,0.40)',   // 人际关系 中玫瑰
  'tool-emotions':    'rgba(190,140,255,0.35)',   // 情绪释放 更浅紫
  'tool-financial':   'rgba(225,195,80,0.35)',    // 财富释放 更浅金
  'nb-tools': 'rgba(80,150,255,0.55)',   // 释放工具 蓝
  'nb-ai':    'rgba(60,200,120,0.50)',   // 释放助手 绿
  'nb-goals': 'rgba(220,80,80,0.48)',    // 目标表 红
  'nb-gains': 'rgba(220,170,20,0.48)',   // 收获本 金
};

function setNavBubbleColors() {
  const allBubbles = document.querySelectorAll('.nav-bubble');
  allBubbles.forEach((b, i) => {
    const glowIdx = b.style.getPropertyValue('--glow-idx');
    const glow = b.id && NAV_MAIN_COLORS[b.id]
      ? NAV_MAIN_COLORS[b.id]
      : glowIdx !== ''
        ? BUBBLE_GLOWS[parseInt(glowIdx)]
        : BUBBLE_GLOWS[i % BUBBLE_GLOWS.length];
    // same glass gradient as hero bubble — transparent, white highlight top-left
    b.style.background = [
      'radial-gradient(circle at 32% 28%,',
      '  rgba(255,255,255,0.75) 0%,',
      '  rgba(220,225,230,0.45) 22%,',
      '  ' + glow.replace('0.35','0.30') + ' 50%,',
      '  ' + glow.replace('0.35','0.22') + ' 75%,',
      '  ' + glow.replace('0.35','0.10') + ' 100%)',
    ].join('');
    b.style.border = 'none';
    b.style.boxShadow = [
      
      'inset 0 0 35px ' + glow.replace('0.35','0.75'),
      'inset 0 0 14px ' + glow.replace('0.35','0.65'),
      '0 4px 22px ' + glow.replace('0.35','0.80'),
      '0 0 32px ' + glow.replace('0.35','0.45'),
    ].join(', ');
  });
}
setNavBubbleColors();

function showNavMain() {
  bubbleTargetAlpha = 0.25;
  heroEl.style.display = 'none';
  navState = 'main';
  showHero = false;
  document.getElementById('nav-layer').style.display = 'block';
  document.getElementById('nav-layer').style.pointerEvents = 'auto';
  document.getElementById('nav-main').style.display = 'block';
  document.getElementById('nav-tools').style.display = 'none';
  setTimeout(() => {
    document.querySelectorAll('#nav-main .nav-bubble').forEach((b, i) => {
      setTimeout(() => b.classList.add('visible'), i * 60);
    });
  }, 50);
}

function showNavTools() {
  navState = 'tools';
  bubbleTargetAlpha = 0.25;
  heroEl.style.display = 'none';
  document.querySelectorAll('#nav-main .nav-bubble').forEach(b => b.classList.remove('visible'));
  setTimeout(() => {
    document.getElementById('nav-main').style.display = 'none';
    document.getElementById('nav-tools').style.display = 'block';
    setTimeout(() => {
      document.querySelectorAll('#nav-tools .nav-bubble').forEach((b, i) => {
        setTimeout(() => b.classList.add('visible'), i * 50);
      });
    }, 50);
  }, 300);
}

function returnToHero() {
  bubbleTargetAlpha = 1.0;
  heroEl.style.display = 'flex';
  navState = 'hero';
  showHero = true;
  document.querySelectorAll('.nav-bubble').forEach(b => b.classList.remove('visible'));
  setTimeout(() => {
    document.getElementById('nav-layer').style.display = 'none';
    document.getElementById('nav-layer').style.pointerEvents = 'none';
  }, 400);
}

// hero bubble click
document.getElementById('hero-bubble').addEventListener('click', function() {
  if (navState !== 'hero') return;
  showNavMain();
});

// tool button
document.getElementById('nb-tools').addEventListener('click', showNavTools);

// placeholder pages
document.getElementById('nb-ai').addEventListener('click', () => window.location.href='assistant.html');
document.getElementById('nb-goals').addEventListener('click', () => window.location.href='goals.html');
document.getElementById('nb-gains').addEventListener('click', () => window.location.href='gains.html');

// tool links
document.querySelectorAll('#nav-tools .nav-bubble[data-href]').forEach(b => {
  b.addEventListener('click', () => { window.location.href = b.dataset.href; });
});

// click backdrop to return
document.getElementById('nav-layer').addEventListener('click', function(e) {
  if (e.target === this) returnToHero();
});

// patch draw to hide hero when nav open
const _origDraw = draw;

</script>

<!-- ════════════════════════════════════════
     登录系统 — HTML 元素
     ════════════════════════════════════════ -->

<!-- 右上角登录气泡按钮 -->
<button id="auth-btn" onclick="onAuthBtnClick()" aria-label="登录">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <circle cx="12" cy="8" r="3.6"/>
    <path d="M5 19c0-3.6 3.2-6 7-6s7 2.4 7 6"/>
  </svg>
</button>

<!-- 登出菜单 -->
<div id="auth-menu">
  <button onclick="doLogout()">登出</button>
</div>

<!-- 登录/注册弹窗 -->
<div id="auth-overlay" onclick="if(event.target===this)closeAuth()">
  <div class="auth-card">
    <button class="auth-close" onclick="closeAuth()">✕</button>
    <div class="auth-title">Freed</div>
    <div class="auth-subtitle">登录以跨设备同步你的目标与收获</div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">登录</button>
      <button class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">注册</button>
    </div>

    <!-- 注册时才显示昵称输入 -->
    <input type="text" id="auth-nickname" class="auth-input" placeholder="昵称" maxlength="20" style="display:none;" />
    <input type="email" id="auth-email" class="auth-input" placeholder="邮箱" autocomplete="email" />
    <input type="password" id="auth-password" class="auth-input" placeholder="密码（至少 6 位）" autocomplete="current-password" />

    <button class="auth-submit" id="auth-submit-btn" onclick="doAuthSubmit()">登 录</button>

    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>

<!-- ════════════════════════════════════════
     登录系统 — JavaScript 逻辑
     ════════════════════════════════════════ -->
<script>
(function(){
  // —— Supabase 配置 ——
  const SUPABASE_URL = 'https://ryoaxziysgdkjcjiuqti.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5b2F4eml5c2dka2pjaml1cXRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MDg2MDAsImV4cCI6MjA4OTA4NDYwMH0.ORG_8Ue8LjYfReMvKo1iQOFNGN7fcTz1_fMs8Gq1Kds';

  // 兼容老用户：如果之前用过 'freed-auth' 这个 key，把数据迁移到 Supabase 默认 key
  // 默认 key 格式：sb-{projectRef}-auth-token
  const DEFAULT_STORAGE_KEY = 'sb-ryoaxziysgdkjcjiuqti-auth-token';
  try {
    const oldVal = localStorage.getItem('freed-auth');
    const newVal = localStorage.getItem(DEFAULT_STORAGE_KEY);
    if (oldVal && !newVal) {
      localStorage.setItem(DEFAULT_STORAGE_KEY, oldVal);
      // 不删除老的，保留作为后备
    }
  } catch(_) {}

  // 创建 Supabase 客户端，挂在全局便于其他页面（goals.html/gains.html）共用
  // 注意：storageKey 必须三个文件保持一致，这样登录态才能跨页面共享
  const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      storageKey: 'sb-ryoaxziysgdkjcjiuqti-auth-token',
    }
  });
  window.freedSupa = supa;

  // —— 当前 tab 状态：'login' 或 'signup' ——
  let currentTab = 'login';

  // —— UI 工具函数 ——
  function $(id) { return document.getElementById(id); }
  function showMsg(text, type) {
    const el = $('auth-msg');
    el.textContent = text;
    el.className = 'auth-msg ' + (type || '');
  }
  function clearMsg() {
    const el = $('auth-msg');
    el.textContent = '';
    el.className = 'auth-msg';
  }
  function setBtnLoading(loading) {
    const btn = $('auth-submit-btn');
    btn.disabled = loading;
    if (loading) {
      btn.dataset.original = btn.textContent;
      btn.textContent = '请稍候…';
    } else if (btn.dataset.original) {
      btn.textContent = btn.dataset.original;
    }
  }

  // —— 弹窗开关 ——
  window.openAuth = function() {
    clearMsg();
    $('auth-overlay').classList.add('show');
  };
  window.closeAuth = function() {
    $('auth-overlay').classList.remove('show');
  };

  // —— Tab 切换 ——
  window.switchAuthTab = function(tab) {
    currentTab = tab;
    clearMsg();
    $('tab-login').classList.toggle('active', tab === 'login');
    $('tab-signup').classList.toggle('active', tab === 'signup');
    $('auth-nickname').style.display = (tab === 'signup') ? 'block' : 'none';
    $('auth-submit-btn').textContent = (tab === 'signup') ? '注 册' : '登 录';
    $('auth-password').setAttribute('autocomplete',
      tab === 'signup' ? 'new-password' : 'current-password');
  };

  // —— 提交（注册或登录） ——
  window.doAuthSubmit = async function() {
    const email = $('auth-email').value.trim();
    const password = $('auth-password').value;
    const nickname = $('auth-nickname').value.trim();

    // 简单校验
    if (!email || !password) {
      showMsg('请填写邮箱和密码', 'error'); return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showMsg('邮箱格式不正确', 'error'); return;
    }
    if (password.length < 6) {
      showMsg('密码至少 6 位', 'error'); return;
    }
    if (currentTab === 'signup' && !nickname) {
      showMsg('请填写昵称', 'error'); return;
    }

    setBtnLoading(true);
    clearMsg();

    try {
      if (currentTab === 'signup') {
        // 注册
        const { data, error } = await supa.auth.signUp({ email, password });
        if (error) throw error;

        // 注册成功后写入昵称到 user_profiles 表
        if (data.user) {
          const { error: profileErr } = await supa
            .from('user_profiles')
            .insert({ id: data.user.id, nickname: nickname });
          if (profileErr) {
            console.warn('昵称保存失败：', profileErr.message);
            // 不阻塞流程，用户已注册成功
          }
        }

        showMsg('注册成功 🌊', 'success');
        setTimeout(() => { closeAuth(); refreshAuthUI(); }, 800);

      } else {
        // 登录
        const { error } = await supa.auth.signInWithPassword({ email, password });
        if (error) throw error;

        showMsg('登录成功 ✨', 'success');
        setTimeout(() => { closeAuth(); refreshAuthUI(); }, 600);
      }
    } catch (err) {
      // 友好错误信息
      let msg = err.message || '操作失败';
      if (msg.includes('Invalid login credentials')) msg = '邮箱或密码错误';
      else if (msg.includes('User already registered')) msg = '该邮箱已注册，请直接登录';
      else if (msg.includes('Password should be')) msg = '密码至少 6 位';
      else if (msg.includes('Email rate limit')) msg = '请求过于频繁，请稍后再试';
      showMsg(msg, 'error');
    } finally {
      setBtnLoading(false);
    }
  };

  // —— 登出 ——
  window.doLogout = async function() {
    $('auth-menu').classList.remove('show');
    await supa.auth.signOut();
    refreshAuthUI();
  };

  // —— 右上角按钮点击 ——
  window.onAuthBtnClick = async function() {
    const { data: { session } } = await supa.auth.getSession();
    if (session) {
      // 已登录：切换显示登出菜单
      $('auth-menu').classList.toggle('show');
    } else {
      // 未登录：打开登录弹窗
      switchAuthTab('login');
      openAuth();
    }
  };

  // —— 点击别处关闭登出菜单 ——
  document.addEventListener('click', function(e) {
    if (!e.target.closest('#auth-btn') && !e.target.closest('#auth-menu')) {
      $('auth-menu').classList.remove('show');
    }
  });

  // —— 刷新右上角按钮显示 ——
  // 直接从 localStorage 读 token 解析（绕过 SDK 加载时序问题）
  function readUserFromLocalStorage() {
    try {
      const raw = localStorage.getItem('sb-ryoaxziysgdkjcjiuqti-auth-token');
      if (!raw) return null;
      const obj = JSON.parse(raw);
      const token = obj && obj.access_token;
      if (!token) return null;
      const parts = token.split('.');
      if (parts.length !== 3) return null;
      const payload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')));
      if (!payload || !payload.sub) return null;
      if (payload.exp && payload.exp * 1000 < Date.now()) return null;
      return { id: payload.sub, email: payload.email || '' };
    } catch(_) { return null; }
  }

  async function refreshAuthUI() {
    const btn = $('auth-btn');
    const SVG_HUMAN = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
      '<circle cx="12" cy="8" r="3.6"/>' +
      '<path d="M5 19c0-3.6 3.2-6 7-6s7 2.4 7 6"/>' +
      '</svg>';

    // 优先用 localStorage 直读
    let user = readUserFromLocalStorage();
    if (!user) {
      // 兜底：让 SDK 试一次
      try {
        const { data: { session } } = await supa.auth.getSession();
        user = (session && session.user) || null;
      } catch(_) {}
    }

    if (user) {
      // 已登录：显示昵称的第一个字（中文）或第一个字母大写（英文）
      let nickname = '';
      try {
        const { data } = await supa
          .from('user_profiles')
          .select('nickname')
          .eq('id', user.id)
          .single();
        nickname = (data && data.nickname) || '';
      } catch(_) {}
      if (!nickname) {
        const email = user.email || '';
        nickname = email.split('@')[0] || '';
      }
      // 取首字符
      let firstChar = '';
      if (nickname) {
        firstChar = nickname.trim().charAt(0);
        if (/[a-zA-Z]/.test(firstChar)) firstChar = firstChar.toUpperCase();
      }
      btn.textContent = firstChar || '·';
      btn.setAttribute('aria-label', '账户');
    } else {
      // 未登录：显示 SVG 小人
      btn.innerHTML = SVG_HUMAN;
      btn.setAttribute('aria-label', '登录');
      $('auth-menu').classList.remove('show');
    }
  }
  window.refreshAuthUI = refreshAuthUI;

  // —— 监听登录态变化（其他 tab 登录/登出时自动同步） ——
  supa.auth.onAuthStateChange((event, session) => {
    refreshAuthUI();
  });

  // —— 页面加载时初始化 UI ——
  refreshAuthUI();
})();
</script>

</body>
