<script>
(function() {
var canvas = document.createElement('canvas');
canvas.id = 'bgCanvas';
canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;';
document.body.insertBefore(canvas, document.body.firstChild);
var ctx = canvas.getContext('2d');
var W, H, t = 0;

const EMOTION_COLORS = [
  {r:144, g:96,  b:208}, // 恐惧 紫
  {r:48,  g:80,  b:176}, // 悲苦 深蓝
  {r:80,  g:110, b:160}, // 万念俱灰 蓝灰
  {r:192, g:96,  b:16 }, // 贪求 橙
  {r:192, g:32,  b:32 }, // 愤怒 红
  {r:176, g:128, b:0  }, // 自尊自傲 金
  {r:16,  g:160, b:144}, // 无畏 青绿
  {r:16,  g:160, b:80 }, // 接纳 绿
  {r:74,  g:176, b:224}, // 平和 天蓝
];


class Bubble {
  constructor(fromBottom) {
    this.reset(fromBottom);
  }

  reset(startAtBottom) {
    this.x    = Math.random() * W;
    this.y    = startAtBottom ? H + 20 + Math.random()*100 : Math.random() * H;
    this.r    = 2 + Math.random() * 22;
    this.vy   = -(0.4 + Math.random() * 1.2);
    this.vx   = 0;
    this.wobbleAmp   = 0.4 + Math.random() * 1.2;
    this.wobbleFreq  = 0.8 + Math.random() * 1.5;
    this.wobblePhase = Math.random() * Math.PI * 2;
    this.opacity = 0.20 + Math.random() * 0.20;
    this.life    = 0;
    this.maxLife = (H + 200) / Math.abs(this.vy) * (0.7 + Math.random()*0.5);
    this.vy *= (0.8 + this.r / 30);
    this.color = EMOTION_COLORS[Math.floor(Math.random() * EMOTION_COLORS.length)];
  }

  update(t) {
    this.life++;
    // wobbly horizontal drift — classic bubble sway
    this.x += Math.sin(t * this.wobbleFreq + this.wobblePhase) * this.wobbleAmp;
    this.y += this.vy;

    // fade in at bottom, fade out at top
    const progress = this.life / this.maxLife;
    if (progress < 0.08) {
      this.opacity = (progress / 0.08) * (0.25 + Math.random()*0.01);
    } else if (progress > 0.85) {
      this.opacity *= 0.97;
    }

    if (this.y < -this.r * 3 || this.life > this.maxLife) {
      this.reset(true);
    }
  }

  draw() {
    const x = this.x, y = this.y, r = this.r;
    const a = this.opacity;

    const {r:cr, g:cg, b:cb} = this.color;

    // outer soft glow — emotion color
    const glow = ctx.createRadialGradient(x,y,r*0.4,x,y,r*2.2);
    glow.addColorStop(0, `rgba(${cr},${cg},${cb},${a*0.65})`);
    glow.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
    ctx.beginPath(); ctx.arc(x,y,r*2.2,0,Math.PI*2);
    ctx.fillStyle=glow; ctx.fill();

    // glass shell — tinted with emotion color
    const shell = ctx.createRadialGradient(x-r*0.32,y-r*0.32,r*0.01, x,y,r);
    shell.addColorStop(0.00, `rgba(255,255,255,${a*0.70})`);
    shell.addColorStop(0.12, `rgba(255,255,255,${a*0.15})`);
    shell.addColorStop(0.55, `rgba(${cr},${cg},${cb},${a*0.48})`);
    shell.addColorStop(0.82, `rgba(${cr},${cg},${cb},${a*0.62})`);
    shell.addColorStop(1.00, `rgba(${cr},${cg},${cb},${a*0.75})`);
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=shell; ctx.fill();

    // rim ring — emotion color tint
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.strokeStyle = `rgba(${cr},${cg},${cb},${a*0.90})`;
    ctx.lineWidth = Math.max(0.5, r*0.06);
    ctx.stroke();

    // primary specular — brighter for dark areas
    const sp = ctx.createRadialGradient(x-r*0.35,y-r*0.35,0,x-r*0.30,y-r*0.30,r*0.32);
    sp.addColorStop(0, `rgba(255,255,255,${Math.min(1, a*1.6)})`);
    sp.addColorStop(1, `rgba(255,255,255,0)`);
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=sp; ctx.fill();

    // tiny secondary shimmer
    const sp2 = ctx.createRadialGradient(x+r*0.38,y+r*0.30,0,x+r*0.38,y+r*0.30,r*0.14);
    sp2.addColorStop(0, `rgba(255,255,255,${a*0.38})`);
    sp2.addColorStop(1, `rgba(255,255,255,0)`);
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=sp2; ctx.fill();
  }
}

const BUBBLES = Array.from({length: 55}, (_, i) => new Bubble(i > 20));

// hero bubble — large, center, also rising slowly

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
function draw() {
  requestAnimationFrame(draw);
  t += 0.01;
  ctx.clearRect(0, 0, W, H);
  var bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#cdeeff');
  bg.addColorStop(0.4, '#a8d8f0');
  bg.addColorStop(0.7, '#7abde0');
  bg.addColorStop(1, '#4a8fbf');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
  BUBBLES.forEach(function(b) { b.update(t); b.draw(); });
}
window.addEventListener('resize', resize);
resize();
draw();
})();
</script>

<script>
const currentLang = 'zh';
const CAT_ICONS = {'健康':'🌿','财富':'💰','SP':'💞','人际关系':'🤝','学业':'📚','工作':'💼','其他':'✨'};
const SUPA_URL  = 'https://ryoaxziysgdkjcjiuqti.supabase.co';
const SUPA_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5b2F4eml5c2dka2pjaml1cXRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MDg2MDAsImV4cCI6MjA4OTA4NDYwMH0.ORG_8Ue8LjYfReMvKo1iQOFNGN7fcTz1_fMs8Gq1Kds';
const GAIN_MAX = 500;

let gainSelectedCat = '健康';
let gainSelectedFilterSb = 'all';
let gainSortSb = 'likes';
const likedKeys = new Set();

function getMyItems() {
  try { return JSON.parse(localStorage.getItem('freed-my-gains') || '[]'); } catch(e) { return []; }
}
function saveMyItems(items) {
  try { localStorage.setItem('freed-my-gains', JSON.stringify(items)); } catch(e) {}
}
function tf(key, n) {
  const map = {
    'my_gains': '我的记录（' + n + '）',
    'shared_gains': '所有人的收获（' + n + '）',
    'gain_recorded': '✨ 已记录到 ' + n,
  };
  return map[key] || key;
}
function showToast(msg) {
  var el = document.getElementById('gainsToast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'gainsToast';
    el.style.cssText = 'position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(10,40,80,0.85);color:#fff;padding:10px 20px;border-radius:99px;font-size:0.85rem;z-index:9999;transition:opacity 0.4s;pointer-events:none;';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.style.opacity = '0'; }, 2500);
}

async function supaFetch(path, opts = {}) {
  const res = await fetch(SUPA_URL + path, {
    ...opts,
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...(opts.headers || {})
    }
  });
  if (!res.ok) return null;
  const ct = res.headers.get('content-type') || '';
  return ct.includes('json') ? res.json() : res.text();
}


function renderGainList(el, items, isShared) {
  if (!items.length) {
    const emptyText = isShared ? '还没有人分享，成为第一个吧 🌸' : '暂无记录';
    el.innerHTML = '<li class="gain-empty">' + emptyText + '</li>';
    return;
  }
  el.innerHTML = items.map(function(item) {
    const icon = CAT_ICONS[item.cat] || '🌸';
    const badge = item.cat ? '<span class="gain-badge">' + icon + ' ' + item.cat + '</span>' : '';
    const likes = item.likes || 0;
    const itemId = isShared ? (item.id + '') : (item.ts + '');
    const liked = likedKeys.has(itemId);
    const likeBtn = isShared
      ? '<button class="gain-like-btn ' + (liked ? 'liked' : '') + '" onclick="likeGain(\'' + item.id + '\', this)">' +
        (liked ? '❤️' : '🤍') + ' <span class="gain-like-count">' + (likes > 0 ? likes : '赞') + '</span></button>'
      : '<span class="gain-meta">' + (likes > 0 ? '❤️ ' + likes : '') + '</span>';
    return '<li class="gain-item ' + (isShared ? 'shared' : '') + '">' +
      '<span class="gain-text">' + escapeHtml(item.text) + '</span>' +
      '<div class="gain-footer">' +
      '<div style="display:flex;align-items:center;gap:6px;">' + badge +
      '<span class="gain-meta">' + formatRelTime(item.ts) + '</span></div>' +
      likeBtn + '</div></li>';
  }).join('');
}

async function loadGainsSb() {
  const myEl     = document.getElementById('myGainListSb');
  const sharedEl = document.getElementById('sharedGainListSb');
  const titleEl  = document.getElementById('sharedGainTitleSb');
  sharedEl.innerHTML = '<li class="gain-loading">加载中…</li>';

  let myItems = getMyItems();
  if (gainSelectedFilterSb !== 'all') myItems = myItems.filter(i => i.cat === gainSelectedFilterSb);
  const myTitleEl = document.getElementById('myGainTitleSb');
  if (myTitleEl) myTitleEl.textContent = tf('my_gains', myItems.length);
  renderGainList(myEl, myItems, false);

  try {
    const order = gainSortSb === 'likes' ? 'likes.desc,ts.desc' : 'ts.desc';
    let url = `/rest/v1/gain_entries?select=*&order=${order}&limit=${GAIN_MAX}`;
    if (gainSelectedFilterSb !== 'all') url += `&cat=eq.${encodeURIComponent(gainSelectedFilterSb)}`;
    const items = await supaFetch(url);
    if (titleEl) titleEl.textContent = tf('shared_gains', (items||[]).length);
    renderGainList(sharedEl, items || [], true);
  } catch(e) {
    console.error('Supabase error:', e.message);
    sharedEl.innerHTML = `<li class="gain-empty">加载失败：${escapeHtml(e.message.slice(0,80))}</li>`;
  }
}

function selectCat(btn, ctx) {
  const scopeId = ctx === 'sb' ? 'gainCatsSb' : 'gainCats';
  const scope = document.getElementById(scopeId);
  if (scope) scope.querySelectorAll('.gain-cat').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  gainSelectedCat = btn.dataset.cat;
}

function selectFilterSb(btn) {
  document.querySelectorAll('#tab-gainbook .gain-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  gainSelectedFilterSb = btn.dataset.filter;
  loadGainsSb();
}

function setSortSb(s) {
  gainSortSb = s;
  document.getElementById('sortLikesSb').classList.toggle('active', s === 'likes');
  document.getElementById('sortTimeSb').classList.toggle('active', s === 'time');
  loadGainsSb();
}

async function submitGainSb() {
  const input = document.getElementById('gainInputSb');
  const text  = input.value.trim();
  if (!text) return;
  input.value = '';
  await _submitGainEntry(text, gainSelectedCat);
  showToast(tf('gain_recorded', gainSelectedCat));
  loadGainsSb();
}

async function _submitGainEntry(text, cat) {
  const entry = { text, cat, ts: Date.now(), likes: 0 };
  const myItems = getMyItems();
  myItems.unshift(entry);
  // no local limit
  saveMyItems(myItems);
  try {
    await supaFetch('/rest/v1/gain_entries', {
      method: 'POST',
      prefer: 'return=minimal',
      body: JSON.stringify(entry),
    });
  } catch(_) {}
}

async function likeGain(id, btn) {
  if (likedKeys.has(id + '')) return;
  likedKeys.add(id + '');
  btn.classList.add('liked');
  btn.innerHTML = '❤️ <span class="gain-like-count">…</span>';
  try {
    const rows = await supaFetch(`/rest/v1/gain_entries?id=eq.${id}&select=likes`);
    const current = (rows && rows[0]) ? (rows[0].likes || 0) : 0;
    const newLikes = current + 1;
    await supaFetch(`/rest/v1/gain_entries?id=eq.${id}`, {
      method: 'PATCH',
      prefer: 'return=minimal',
      body: JSON.stringify({ likes: newLikes }),
    });
    btn.querySelector('.gain-like-count').textContent = newLikes;
  } catch(e) {
    btn.querySelector('.gain-like-count').textContent = '赞';
  }
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatRelTime(ts) {
  const diff = Date.now() - ts;
  if (currentLang === 'en') {
    if (diff < 60000)    return 'just now';
    if (diff < 3600000)  return Math.floor(diff/60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
    return Math.floor(diff/86400000) + 'd ago';
  }
  if (diff < 60000)    return '刚刚';
  if (diff < 3600000)  return Math.floor(diff/60000) + ' 分钟前';
  if (diff < 86400000) return Math.floor(diff/3600000) + ' 小时前';
  return Math.floor(diff/86400000) + ' 天前';
}
